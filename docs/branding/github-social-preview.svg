<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E12"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <radialGradient id="bgRadial" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#16161E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>
    <!-- Vignette overlay: darken edges -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Curve glow filter -->
    <filter id="curveGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="curveGlowStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Point halo glow -->
    <filter id="pointGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Active point glow (gold) -->
    <filter id="activeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Scanline glow -->
    <filter id="scanGlow" x="-50%" y="-5%" width="200%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft glow for the scanline intersection dot -->
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Fill under curve -->
    <linearGradient id="curveFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4DD9FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4DD9FF" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="gridSmall" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A22" stroke-width="0.5" stroke-opacity="0.4"/>
    </pattern>
    <pattern id="gridLarge" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M 160 0 L 0 0 0 160" fill="none" stroke="#1A1A22" stroke-width="1" stroke-opacity="0.5"/>
    </pattern>

    <!-- Badge gradient -->
    <linearGradient id="badgeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4DD9FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4DD9FF" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- ============================================================ -->
  <!-- BACKGROUND                                                    -->
  <!-- ============================================================ -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <!-- Grid layers -->
  <rect width="1280" height="640" fill="url(#gridSmall)"/>
  <rect width="1280" height="640" fill="url(#gridLarge)"/>
  <!-- Radial depth from center -->
  <rect width="1280" height="640" fill="url(#bgRadial)"/>
  <!-- Vignette darkens edges -->
  <rect width="1280" height="640" fill="url(#vignette)"/>

  <!-- ============================================================ -->
  <!-- SCATTERED PARTICLES (top decorative)                          -->
  <!-- ============================================================ -->
  <g>
    <circle cx="120" cy="45" r="1.2" fill="#4DD9FF" opacity="0.12"/>
    <circle cx="310" cy="72" r="2" fill="#4DD9FF" opacity="0.07"/>
    <circle cx="480" cy="30" r="1.5" fill="#4DD9FF" opacity="0.10"/>
    <circle cx="640" cy="55" r="1" fill="#4DD9FF" opacity="0.15"/>
    <circle cx="780" cy="38" r="2.5" fill="#4DD9FF" opacity="0.06"/>
    <circle cx="920" cy="65" r="1.3" fill="#4DD9FF" opacity="0.13"/>
    <circle cx="1050" cy="42" r="1.8" fill="#4DD9FF" opacity="0.08"/>
    <circle cx="1160" cy="78" r="1" fill="#4DD9FF" opacity="0.11"/>
    <circle cx="200" cy="110" r="1.5" fill="#4DD9FF" opacity="0.05"/>
    <circle cx="430" cy="95" r="2.2" fill="#4DD9FF" opacity="0.06"/>
    <circle cx="700" cy="100" r="1" fill="#4DD9FF" opacity="0.09"/>
    <circle cx="860" cy="88" r="1.7" fill="#4DD9FF" opacity="0.07"/>
    <circle cx="1100" cy="105" r="2" fill="#4DD9FF" opacity="0.05"/>
    <circle cx="55" cy="200" r="1.4" fill="#4DD9FF" opacity="0.08"/>
    <circle cx="1230" cy="180" r="1.6" fill="#4DD9FF" opacity="0.06"/>
    <circle cx="350" cy="520" r="1.2" fill="#4DD9FF" opacity="0.07"/>
    <circle cx="950" cy="490" r="1.8" fill="#4DD9FF" opacity="0.05"/>
    <circle cx="170" cy="400" r="1" fill="#4DD9FF" opacity="0.09"/>
    <circle cx="1120" cy="370" r="1.5" fill="#4DD9FF" opacity="0.06"/>
    <circle cx="580" cy="560" r="2" fill="#4DD9FF" opacity="0.05"/>
  </g>

  <!-- Top-left accent line -->
  <line x1="48" y1="30" x2="48" y2="70" stroke="#4DD9FF" stroke-width="2" stroke-opacity="0.30"/>

  <!-- ============================================================ -->
  <!-- CURVE VISUALIZATION (center piece, ~y220 to ~y520)            -->
  <!-- ============================================================ -->
  <!--
    Control points (5 total):
    P0: (100, 480)   - bottom-left start
    P1: (320, 460)   - slight rise
    P2: (540, 240)   - middle high (ACTIVE - gold)
    P3: (860, 380)   - dip back
    P4: (1180, 230)  - top-right end

    The path uses smooth cubic beziers through these points.
  -->

  <!-- Fill area under the curve -->
  <path d="M 100,480
           C 160,478 240,470 320,460
           C 400,448 460,310 540,240
           C 620,170 740,370 860,380
           C 960,388 1080,270 1180,230
           L 1180,530 100,530 Z"
        fill="url(#curveFill)"/>

  <!-- Curve glow layer (wider, behind) -->
  <path d="M 100,480
           C 160,478 240,470 320,460
           C 400,448 460,310 540,240
           C 620,170 740,370 860,380
           C 960,388 1080,270 1180,230"
        fill="none" stroke="#4DD9FF" stroke-width="5" stroke-opacity="0.3"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#curveGlowStrong)"/>

  <!-- Main curve stroke -->
  <path d="M 100,480
           C 160,478 240,470 320,460
           C 400,448 460,310 540,240
           C 620,170 740,370 860,380
           C 960,388 1080,270 1180,230"
        fill="none" stroke="#4DD9FF" stroke-width="3" stroke-opacity="1"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#curveGlow)"/>

  <!-- ============================================================ -->
  <!-- TANGENT HANDLES (on P1 and P3)                                -->
  <!-- ============================================================ -->
  <!-- P1 tangent handles -->
  <line x1="240" y1="470" x2="320" y2="460" stroke="#4DD9FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="320" y1="460" x2="400" y2="448" stroke="#4DD9FF" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="240" cy="470" r="3" fill="#4DD9FF" fill-opacity="0.3"/>
  <circle cx="400" cy="448" r="3" fill="#4DD9FF" fill-opacity="0.3"/>

  <!-- P3 tangent handles -->
  <line x1="740" y1="370" x2="860" y2="380" stroke="#4DD9FF" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="860" y1="380" x2="960" y2="388" stroke="#4DD9FF" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="740" cy="370" r="3" fill="#4DD9FF" fill-opacity="0.3"/>
  <circle cx="960" cy="388" r="3" fill="#4DD9FF" fill-opacity="0.3"/>

  <!-- ============================================================ -->
  <!-- CONTROL POINTS                                                -->
  <!-- ============================================================ -->
  <!-- P0: (100, 480) -->
  <g filter="url(#pointGlow)">
    <circle cx="100" cy="480" r="10" fill="none" stroke="#4DD9FF" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="100" cy="480" r="6" fill="white" fill-opacity="0.95"/>
  </g>

  <!-- P1: (320, 460) -->
  <g filter="url(#pointGlow)">
    <circle cx="320" cy="460" r="10" fill="none" stroke="#4DD9FF" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="320" cy="460" r="6" fill="white" fill-opacity="0.95"/>
  </g>

  <!-- P2: (540, 240) -- ACTIVE POINT (gold, being dragged) -->
  <g filter="url(#activeGlow)">
    <circle cx="540" cy="240" r="14" fill="none" stroke="#FFCC33" stroke-width="2" stroke-opacity="0.4"/>
    <circle cx="540" cy="240" r="10" fill="none" stroke="#FFCC33" stroke-width="1.5" stroke-opacity="0.7"/>
    <circle cx="540" cy="240" r="6" fill="#FFCC33" fill-opacity="1"/>
  </g>
  <!-- Drag indicator: small arrow hint / motion lines near active point -->
  <line x1="525" y1="250" x2="520" y2="255" stroke="#FFCC33" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="555" y1="230" x2="560" y2="225" stroke="#FFCC33" stroke-width="1" stroke-opacity="0.3"/>

  <!-- P3: (860, 380) -->
  <g filter="url(#pointGlow)">
    <circle cx="860" cy="380" r="10" fill="none" stroke="#4DD9FF" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="860" cy="380" r="6" fill="white" fill-opacity="0.95"/>
  </g>

  <!-- P4: (1180, 230) -->
  <g filter="url(#pointGlow)">
    <circle cx="1180" cy="230" r="10" fill="none" stroke="#4DD9FF" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="1180" cy="230" r="6" fill="white" fill-opacity="0.95"/>
  </g>

  <!-- ============================================================ -->
  <!-- LFO SCANLINE                                                  -->
  <!-- ============================================================ -->
  <line x1="832" y1="195" x2="832" y2="540" stroke="#33FF80" stroke-width="1.5" stroke-opacity="0.6"
        filter="url(#scanGlow)"/>
  <!-- Faint scanline extensions -->
  <line x1="832" y1="195" x2="832" y2="540" stroke="#33FF80" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Intersection dot -->
  <g filter="url(#dotGlow)">
    <circle cx="832" cy="377" r="7" fill="#33FF80" fill-opacity="0.3"/>
    <circle cx="832" cy="377" r="5" fill="#33FF80" fill-opacity="0.9"/>
  </g>

  <!-- ============================================================ -->
  <!-- TEXT OVERLAY                                                   -->
  <!-- ============================================================ -->
  <!-- Title -->
  <text x="640" y="148" text-anchor="middle"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="108" font-weight="700" fill="white" letter-spacing="4"
        filter="url(#textGlow)">td-CurveEditor</text>

  <!-- Subtitle -->
  <text x="640" y="196" text-anchor="middle"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="32" fill="#4DD9FF" fill-opacity="0.80" font-weight="400">Interactive GLSL Curve Editor + LFO for TouchDesigner</text>

  <!-- Tagline -->
  <text x="640" y="234" text-anchor="middle"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="24" fill="#888899" font-weight="300">Draw envelopes. Shape waveforms. Control everything.</text>

  <!-- ============================================================ -->
  <!-- BOTTOM BAR                                                    -->
  <!-- ============================================================ -->
  <!-- Separator -->
  <line x1="60" y1="596" x2="1220" y2="596" stroke="#4DD9FF" stroke-width="0.5" stroke-opacity="0.10"/>

  <!-- Left: REMvisual -->
  <text x="60" y="625" text-anchor="start"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" fill="#555566" font-weight="400">REMvisual</text>

  <!-- Right: version + license -->
  <text x="1220" y="625" text-anchor="end"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" fill="#555566" font-weight="400">v1.1  &#183;  MIT License</text>

  <!-- Center: Feature badges -->
  <!-- Badge 1: GLSL Rendered -->
  <g transform="translate(428, 604)">
    <rect x="0" y="0" width="148" height="32" rx="16" ry="16"
          fill="url(#badgeBg)" stroke="#4DD9FF" stroke-width="1" stroke-opacity="0.35"/>
    <text x="74" y="21" text-anchor="middle"
          font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="16" fill="#4DD9FF" fill-opacity="0.85" font-weight="500">GLSL Rendered</text>
  </g>

  <!-- Badge 2: 12 Presets -->
  <g transform="translate(590, 604)">
    <rect x="0" y="0" width="120" height="32" rx="16" ry="16"
          fill="url(#badgeBg)" stroke="#4DD9FF" stroke-width="1" stroke-opacity="0.35"/>
    <text x="60" y="21" text-anchor="middle"
          font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="16" fill="#4DD9FF" fill-opacity="0.85" font-weight="500">12 Presets</text>
  </g>

  <!-- Badge 3: LFO + BPM Sync -->
  <g transform="translate(724, 604)">
    <rect x="0" y="0" width="158" height="32" rx="16" ry="16"
          fill="url(#badgeBg)" stroke="#4DD9FF" stroke-width="1" stroke-opacity="0.35"/>
    <text x="79" y="21" text-anchor="middle"
          font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="16" fill="#4DD9FF" fill-opacity="0.85" font-weight="500">LFO + BPM Sync</text>
  </g>

</svg>