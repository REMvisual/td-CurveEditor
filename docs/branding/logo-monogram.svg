<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: dark center fading darker at edges -->
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#0E0E12"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>

    <!-- Cyan glow for the bezier curve -->
    <filter id="curveGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Wide atmospheric glow -->
    <filter id="curveGlowOuter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>

    <!-- Control point halo glow -->
    <filter id="pointGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle white letter glow -->
    <filter id="letterGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Border gradient: cyan, brighter at top -->
    <radialGradient id="borderGrad" cx="50%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#4DD9FF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4DD9FF" stop-opacity="0.08"/>
    </radialGradient>

    <!-- Circle clip for grid dots -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="224"/>
    </clipPath>
  </defs>

  <!-- ================================================ -->
  <!--  BACKGROUND                                      -->
  <!-- ================================================ -->
  <circle cx="256" cy="256" r="224" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="223.5" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>

  <!-- ================================================ -->
  <!--  GRID DOTS                                       -->
  <!-- ================================================ -->
  <g clip-path="url(#circleClip)" opacity="0.4">
    <circle cx="96"  cy="96"  r="1.1" fill="#1A1A22"/><circle cx="136" cy="96"  r="0.9" fill="#1A1A22"/>
    <circle cx="176" cy="96"  r="1.1" fill="#1A1A22"/><circle cx="216" cy="96"  r="0.9" fill="#1A1A22"/>
    <circle cx="256" cy="96"  r="1.1" fill="#1A1A22"/><circle cx="296" cy="96"  r="0.9" fill="#1A1A22"/>
    <circle cx="336" cy="96"  r="1.1" fill="#1A1A22"/><circle cx="376" cy="96"  r="0.9" fill="#1A1A22"/>
    <circle cx="416" cy="96"  r="1.1" fill="#1A1A22"/>
    <circle cx="116" cy="136" r="0.9" fill="#1A1A22"/><circle cx="156" cy="136" r="1.1" fill="#1A1A22"/>
    <circle cx="196" cy="136" r="0.9" fill="#1A1A22"/><circle cx="236" cy="136" r="1.1" fill="#1A1A22"/>
    <circle cx="276" cy="136" r="0.9" fill="#1A1A22"/><circle cx="316" cy="136" r="1.1" fill="#1A1A22"/>
    <circle cx="356" cy="136" r="0.9" fill="#1A1A22"/><circle cx="396" cy="136" r="1.1" fill="#1A1A22"/>
    <circle cx="96"  cy="176" r="1.1" fill="#1A1A22"/><circle cx="136" cy="176" r="0.9" fill="#1A1A22"/>
    <circle cx="176" cy="176" r="1.1" fill="#1A1A22"/><circle cx="216" cy="176" r="0.9" fill="#1A1A22"/>
    <circle cx="256" cy="176" r="1.1" fill="#1A1A22"/><circle cx="296" cy="176" r="0.9" fill="#1A1A22"/>
    <circle cx="336" cy="176" r="1.1" fill="#1A1A22"/><circle cx="376" cy="176" r="0.9" fill="#1A1A22"/>
    <circle cx="416" cy="176" r="1.1" fill="#1A1A22"/>
    <circle cx="116" cy="216" r="0.9" fill="#1A1A22"/><circle cx="156" cy="216" r="1.1" fill="#1A1A22"/>
    <circle cx="196" cy="216" r="0.9" fill="#1A1A22"/><circle cx="236" cy="216" r="1.1" fill="#1A1A22"/>
    <circle cx="276" cy="216" r="0.9" fill="#1A1A22"/><circle cx="316" cy="216" r="1.1" fill="#1A1A22"/>
    <circle cx="356" cy="216" r="0.9" fill="#1A1A22"/><circle cx="396" cy="216" r="1.1" fill="#1A1A22"/>
    <circle cx="96"  cy="256" r="1.1" fill="#1A1A22"/><circle cx="136" cy="256" r="0.9" fill="#1A1A22"/>
    <circle cx="176" cy="256" r="1.1" fill="#1A1A22"/><circle cx="216" cy="256" r="0.9" fill="#1A1A22"/>
    <circle cx="256" cy="256" r="1.1" fill="#1A1A22"/><circle cx="296" cy="256" r="0.9" fill="#1A1A22"/>
    <circle cx="336" cy="256" r="1.1" fill="#1A1A22"/><circle cx="376" cy="256" r="0.9" fill="#1A1A22"/>
    <circle cx="416" cy="256" r="1.1" fill="#1A1A22"/>
    <circle cx="116" cy="296" r="0.9" fill="#1A1A22"/><circle cx="156" cy="296" r="1.1" fill="#1A1A22"/>
    <circle cx="196" cy="296" r="0.9" fill="#1A1A22"/><circle cx="236" cy="296" r="1.1" fill="#1A1A22"/>
    <circle cx="276" cy="296" r="0.9" fill="#1A1A22"/><circle cx="316" cy="296" r="1.1" fill="#1A1A22"/>
    <circle cx="356" cy="296" r="0.9" fill="#1A1A22"/><circle cx="396" cy="296" r="1.1" fill="#1A1A22"/>
    <circle cx="96"  cy="336" r="1.1" fill="#1A1A22"/><circle cx="136" cy="336" r="0.9" fill="#1A1A22"/>
    <circle cx="176" cy="336" r="1.1" fill="#1A1A22"/><circle cx="216" cy="336" r="0.9" fill="#1A1A22"/>
    <circle cx="256" cy="336" r="1.1" fill="#1A1A22"/><circle cx="296" cy="336" r="0.9" fill="#1A1A22"/>
    <circle cx="336" cy="336" r="1.1" fill="#1A1A22"/><circle cx="376" cy="336" r="0.9" fill="#1A1A22"/>
    <circle cx="416" cy="336" r="1.1" fill="#1A1A22"/>
    <circle cx="116" cy="376" r="0.9" fill="#1A1A22"/><circle cx="156" cy="376" r="1.1" fill="#1A1A22"/>
    <circle cx="196" cy="376" r="0.9" fill="#1A1A22"/><circle cx="236" cy="376" r="1.1" fill="#1A1A22"/>
    <circle cx="276" cy="376" r="0.9" fill="#1A1A22"/><circle cx="316" cy="376" r="1.1" fill="#1A1A22"/>
    <circle cx="356" cy="376" r="0.9" fill="#1A1A22"/><circle cx="396" cy="376" r="1.1" fill="#1A1A22"/>
    <circle cx="96"  cy="416" r="1.1" fill="#1A1A22"/><circle cx="136" cy="416" r="0.9" fill="#1A1A22"/>
    <circle cx="176" cy="416" r="1.1" fill="#1A1A22"/><circle cx="216" cy="416" r="0.9" fill="#1A1A22"/>
    <circle cx="256" cy="416" r="1.1" fill="#1A1A22"/><circle cx="296" cy="416" r="0.9" fill="#1A1A22"/>
    <circle cx="336" cy="416" r="1.1" fill="#1A1A22"/><circle cx="376" cy="416" r="0.9" fill="#1A1A22"/>
    <circle cx="416" cy="416" r="1.1" fill="#1A1A22"/>
  </g>

  <!-- ================================================ -->
  <!--  "t" LETTERFORM — left side                      -->
  <!--                                                   -->
  <!--  Geometry:                                        -->
  <!--    Stem: x=176, y=148..358                        -->
  <!--    Crossbar: y=218, from x=140 to x=208          -->
  <!--    (x=208 is where the bezier curve picks up)     -->
  <!--    Foot: subtle rightward curve at base           -->
  <!-- ================================================ -->
  <g filter="url(#letterGlow)">
    <line x1="176" y1="148" x2="176" y2="358"
          stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <line x1="140" y1="218" x2="208" y2="218"
          stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <path d="M 176,358 Q 188,360 198,348"
          fill="none" stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round"/>
  </g>

  <!-- ================================================ -->
  <!--  "d" VERTICAL STEM — right side                  -->
  <!--                                                   -->
  <!--  The stem is the ascender. The bowl is entirely   -->
  <!--  formed by the bezier curve, so only the vertical -->
  <!--  stroke and foot are drawn here.                  -->
  <!--                                                   -->
  <!--  Geometry:                                        -->
  <!--    Stem: x=352, y=148..358                        -->
  <!--    Foot: subtle leftward curve at base            -->
  <!-- ================================================ -->
  <g filter="url(#letterGlow)">
    <line x1="352" y1="148" x2="352" y2="358"
          stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <path d="M 352,358 Q 340,360 330,348"
          fill="none" stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round"/>
  </g>

  <!-- ================================================ -->
  <!--  THE BEZIER CURVE                                 -->
  <!--                                                   -->
  <!--  This single continuous path does triple duty:    -->
  <!--    1. "t" crossbar continuation (right half)      -->
  <!--    2. Flowing curve editor design element         -->
  <!--    3. The entire bowl of the letter "d"           -->
  <!--                                                   -->
  <!--  Path anatomy:                                    -->
  <!--    M  208,218          Start: end of "t" crossbar -->
  <!--    C  ...  300,190     Rise: expressive peak       -->
  <!--                        between the two letters    -->
  <!--    C  ...  352,225     Arrive at "d" stem top     -->
  <!--    (invisible join at stem)                       -->
  <!--    C  ...  268,290     Bowl belly: curves left    -->
  <!--    C  ...  352,354     Return to "d" stem bottom  -->
  <!--                                                   -->
  <!--  The open path starts at the "t" and ends at      -->
  <!--  the "d" — one fluid stroke connecting both.      -->
  <!-- ================================================ -->

  <!-- Atmospheric outer glow -->
  <path
    d="M 208,218
       C 248,186  278,178  300,188
       C 328,200  352,212  352,225
       L 352,225
       C 350,238  330,258  302,278
       C 268,302  256,330  274,350
       C 296,370  334,360  352,354"
    fill="none" stroke="#4DD9FF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.1" filter="url(#curveGlowOuter)"
  />

  <!-- Mid glow layer -->
  <path
    d="M 208,218
       C 248,186  278,178  300,188
       C 328,200  352,212  352,225
       L 352,225
       C 350,238  330,258  302,278
       C 268,302  256,330  274,350
       C 296,370  334,360  352,354"
    fill="none" stroke="#4DD9FF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.22" filter="url(#curveGlow)"
  />

  <!-- Primary stroke -->
  <path
    d="M 208,218
       C 248,186  278,178  300,188
       C 328,200  352,212  352,225
       L 352,225
       C 350,238  330,258  302,278
       C 268,302  256,330  274,350
       C 296,370  334,360  352,354"
    fill="none" stroke="#4DD9FF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#curveGlow)"
  />

  <!-- Bright inner core -->
  <path
    d="M 208,218
       C 248,186  278,178  300,188
       C 328,200  352,212  352,225
       L 352,225
       C 350,238  330,258  302,278
       C 268,302  256,330  274,350
       C 296,370  334,360  352,354"
    fill="none" stroke="#DFFFFF" stroke-width="1.2" stroke-linecap="round"
    opacity="0.45"
  />

  <!-- ================================================ -->
  <!--  CONTROL POINTS                                   -->
  <!--  Each: halo (cyan, blurred) + body (white) +     -->
  <!--        center dot (cyan)                          -->
  <!-- ================================================ -->

  <!-- CP 1: Start — junction of "t" crossbar and curve -->
  <circle cx="208" cy="218" r="8" fill="#4DD9FF" opacity="0.15" filter="url(#pointGlow)"/>
  <circle cx="208" cy="218" r="4" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="208" cy="218" r="1.8" fill="#4DD9FF"/>

  <!-- CP 2: Peak — highest point of the connecting arc -->
  <circle cx="300" cy="188" r="8" fill="#4DD9FF" opacity="0.15" filter="url(#pointGlow)"/>
  <circle cx="300" cy="188" r="4" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="300" cy="188" r="1.8" fill="#4DD9FF"/>

  <!-- CP 3: Bowl nadir — deepest point of the "d" belly -->
  <circle cx="274" cy="350" r="8" fill="#4DD9FF" opacity="0.15" filter="url(#pointGlow)"/>
  <circle cx="274" cy="350" r="4" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="274" cy="350" r="1.8" fill="#4DD9FF"/>

</svg>