<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Bezel gradient -->
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E12"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>

    <!-- Phosphor screen glow -->
    <radialGradient id="phosphorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A1520"/>
      <stop offset="100%" stop-color="#060610"/>
    </radialGradient>

    <!-- Curve phosphor bloom -->
    <filter id="phosphorBloom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="bloom"/>
      <feComposite in="SourceGraphic" in2="bloom" operator="over"/>
    </filter>

    <!-- Tighter glow for control points -->
    <filter id="pointGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>

    <!-- LED glow -->
    <filter id="ledGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>

    <!-- Subtle text glow -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>

    <!-- Scanline pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="512" height="3">
      <rect width="512" height="1" fill="#FFFFFF" opacity="0.02"/>
      <rect y="1" width="512" height="2" fill="transparent"/>
    </pattern>

    <!-- Screen clip path -->
    <clipPath id="screenClip">
      <rect x="56" y="52" width="400" height="360" rx="16"/>
    </clipPath>
  </defs>

  <!-- === OUTER FRAME (monitor body) === -->
  <rect x="6" y="6" width="500" height="500" rx="32" fill="#1A1A22" stroke="#222230" stroke-width="1"/>

  <!-- === INNER BEZEL === -->
  <rect x="16" y="16" width="480" height="480" rx="26" fill="url(#bezelGrad)"/>

  <!-- Bezel screws (decorative corners) -->
  <circle cx="36" cy="36" r="4" fill="#0C0C14" stroke="#1A1A22" stroke-width="1.5"/>
  <circle cx="476" cy="36" r="4" fill="#0C0C14" stroke="#1A1A22" stroke-width="1.5"/>
  <circle cx="36" cy="476" r="4" fill="#0C0C14" stroke="#1A1A22" stroke-width="1.5"/>
  <circle cx="476" cy="476" r="4" fill="#0C0C14" stroke="#1A1A22" stroke-width="1.5"/>

  <!-- === SCREEN AREA === -->
  <rect x="46" y="42" width="420" height="380" rx="20" fill="#040408" stroke="#0A0A14" stroke-width="2"/>

  <!-- Screen interior -->
  <rect x="56" y="52" width="400" height="360" rx="16" fill="#060610"/>

  <!-- Phosphor glow layer -->
  <rect x="56" y="52" width="400" height="360" rx="16" fill="url(#phosphorGlow)" opacity="0.8"/>

  <!-- === SCREEN CONTENT (clipped) === -->
  <g clip-path="url(#screenClip)">

    <!-- Grid lines (dark green-tinted) -->
    <!-- Vertical grid -->
    <line x1="106" y1="52" x2="106" y2="412" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="156" y1="52" x2="156" y2="412" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="206" y1="52" x2="206" y2="412" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="256" y1="52" x2="256" y2="412" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="306" y1="52" x2="306" y2="412" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="356" y1="52" x2="356" y2="412" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="406" y1="52" x2="406" y2="412" stroke="#0A2A0A" stroke-width="1"/>

    <!-- Horizontal grid -->
    <line x1="56" y1="97" x2="456" y2="97" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="56" y1="142" x2="456" y2="142" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="56" y1="187" x2="456" y2="187" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="56" y1="232" x2="456" y2="232" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="56" y1="277" x2="456" y2="277" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="56" y1="322" x2="456" y2="322" stroke="#0A2A0A" stroke-width="1"/>
    <line x1="56" y1="367" x2="456" y2="367" stroke="#0A2A0A" stroke-width="1"/>

    <!-- Center crosshair (brighter) -->
    <line x1="256" y1="52" x2="256" y2="412" stroke="#0F3A0F" stroke-width="1"/>
    <line x1="56" y1="232" x2="456" y2="232" stroke="#0F3A0F" stroke-width="1"/>

    <!-- === CURVE: Ghost echo (CRT ghosting, offset 1px down) === -->
    <path
      d="M 76,350 C 120,340 140,310 176,260 C 210,215 230,180 256,160 C 285,138 320,190 356,240 C 380,275 410,310 436,280"
      fill="none"
      stroke="#33FF80"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.15"
      transform="translate(0, 1)"
    />

    <!-- === CURVE: Main phosphor trace === -->
    <path
      d="M 76,350 C 120,340 140,310 176,260 C 210,215 230,180 256,160 C 285,138 320,190 356,240 C 380,275 410,310 436,280"
      fill="none"
      stroke="#33FF80"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#phosphorBloom)"
    />

    <!-- === CONTROL POINTS === -->
    <!-- Point 1 -->
    <circle cx="176" cy="260" r="8" fill="#33FF80" opacity="0.2" filter="url(#pointGlow)"/>
    <circle cx="176" cy="260" r="4" fill="#FFFFFF" stroke="#33FF80" stroke-width="1.5"/>

    <!-- Point 2 -->
    <circle cx="256" cy="160" r="8" fill="#33FF80" opacity="0.2" filter="url(#pointGlow)"/>
    <circle cx="256" cy="160" r="4" fill="#FFFFFF" stroke="#33FF80" stroke-width="1.5"/>

    <!-- Point 3 -->
    <circle cx="356" cy="240" r="8" fill="#33FF80" opacity="0.2" filter="url(#pointGlow)"/>
    <circle cx="356" cy="240" r="4" fill="#FFFFFF" stroke="#33FF80" stroke-width="1.5"/>

    <!-- === CH1 label === -->
    <text x="70" y="74" font-family="'Courier New', monospace" font-size="13" fill="#33FF80" opacity="0.4">CH1</text>

    <!-- Trigger indicator -->
    <text x="410" y="74" font-family="'Courier New', monospace" font-size="11" fill="#33FF80" opacity="0.3" text-anchor="end">TRIG</text>

    <!-- Small scale markings along center lines -->
    <line x1="253" y1="97" x2="259" y2="97" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="253" y1="142" x2="259" y2="142" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="253" y1="187" x2="259" y2="187" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="253" y1="277" x2="259" y2="277" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="253" y1="322" x2="259" y2="322" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="253" y1="367" x2="259" y2="367" stroke="#0F3A0F" stroke-width="1.5"/>

    <line x1="106" y1="229" x2="106" y2="235" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="156" y1="229" x2="156" y2="235" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="206" y1="229" x2="206" y2="235" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="306" y1="229" x2="306" y2="235" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="356" y1="229" x2="356" y2="235" stroke="#0F3A0F" stroke-width="1.5"/>
    <line x1="406" y1="229" x2="406" y2="235" stroke="#0F3A0F" stroke-width="1.5"/>

    <!-- Scanline overlay (CRT effect) -->
    <rect x="56" y="52" width="400" height="360" fill="url(#scanlines)"/>

    <!-- Subtle vignette on screen edges -->
    <rect x="56" y="52" width="400" height="360" rx="16" fill="none" stroke="#000000" stroke-width="20" opacity="0.3"/>

  </g>

  <!-- === BEZEL DETAILS (below screen) === -->

  <!-- LED: Power (red) -->
  <circle cx="80" cy="446" r="5" fill="#FF3333" filter="url(#ledGlow)"/>
  <circle cx="80" cy="446" r="3" fill="#FF6666"/>
  <text x="80" y="464" font-family="'Courier New', monospace" font-size="8" fill="#555560" text-anchor="middle">PWR</text>

  <!-- LED: Signal (green) -->
  <circle cx="120" cy="446" r="5" fill="#33FF80" filter="url(#ledGlow)"/>
  <circle cx="120" cy="446" r="3" fill="#80FFAA"/>
  <text x="120" y="464" font-family="'Courier New', monospace" font-size="8" fill="#555560" text-anchor="middle">SIG</text>

  <!-- Instrument label -->
  <text
    x="256"
    y="450"
    font-family="'Courier New', 'Consolas', monospace"
    font-size="24"
    fill="#33FF80"
    text-anchor="middle"
    letter-spacing="2"
    filter="url(#textGlow)"
  >td-CurveEditor</text>

  <!-- Version badge -->
  <text
    x="256"
    y="470"
    font-family="'Courier New', monospace"
    font-size="10"
    fill="#33FF80"
    opacity="0.35"
    text-anchor="middle"
    letter-spacing="3"
  >ENVELOPE / LFO</text>

  <!-- Decorative line under screen -->
  <line x1="56" y1="424" x2="456" y2="424" stroke="#1A1A22" stroke-width="1"/>

  <!-- Small brand mark on right side of bezel -->
  <text
    x="440"
    y="450"
    font-family="'Courier New', monospace"
    font-size="9"
    fill="#333340"
    text-anchor="end"
  >v1.1</text>

</svg>