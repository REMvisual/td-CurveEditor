<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#111118"/><stop offset="100%" stop-color="#0a0a10"/></linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4dd9ff" stop-opacity="0.08"/><stop offset="100%" stop-color="#4dd9ff" stop-opacity="0"/></linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#33ff80" stop-opacity="0"/><stop offset="60%" stop-color="#33ff80" stop-opacity="0.04"/><stop offset="100%" stop-color="#33ff80" stop-opacity="0.12"/></linearGradient>
    <radialGradient id="dot"><stop offset="0%" stop-color="#33ff80" stop-opacity="0.6"/><stop offset="40%" stop-color="#33ff80" stop-opacity="0.2"/><stop offset="100%" stop-color="#33ff80" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Waveform — right side -->
  <g transform="translate(600, 0)">
    <line x1="0" y1="170" x2="680" y2="170" stroke="#1a1a24" stroke-width="0.6"/>
    <path d="M 0,170 L 60,170 C 110,170 125,35 180,35 C 235,35 225,250 280,250 C 335,250 325,90 380,90 C 420,90 440,170 480,170 L 680,170 L 680,320 L 0,320 Z" fill="url(#fill)"/>
    <path d="M 0,170 L 60,170 C 110,170 125,35 180,35 C 235,35 225,250 280,250 C 335,250 325,90 380,90 C 420,90 440,170 480,170 L 680,170" fill="none" stroke="#4dd9ff" stroke-width="3" stroke-linecap="round"/>
    <rect x="160" y="0" width="120" height="320" fill="url(#trail)"/>
    <line x1="280" y1="6" x2="280" y2="314" stroke="#33ff80" stroke-width="1.8" opacity="0.55"/>
    <circle cx="280" cy="250" r="14" fill="url(#dot)"/>
    <circle cx="280" cy="250" r="6" fill="#33ff80"/>
    <circle cx="280" cy="250" r="2.5" fill="#fff"/>
  </g>

  <!-- Title -->
  <text x="72" y="128" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="86" letter-spacing="-2" fill="#fff" font-weight="800"><tspan fill="#4dd9ff">Curve</tspan><tspan>Tool</tspan></text>
  <text x="76" y="164" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="20" fill="#666680" font-weight="500">Curve Editor + LFO for TouchDesigner</text>

  <!-- Pills — two rows, left-aligned -->
  <g font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700">
    <rect x="72" y="196" width="100" height="28" rx="14" fill="#4dd9ff12" stroke="#4dd9ff" stroke-opacity="0.3" stroke-width="1"/><text x="122" y="215" text-anchor="middle" fill="#4dd9ff">4 Layers</text>
    <rect x="184" y="196" width="118" height="28" rx="14" fill="#33ff8012" stroke="#33ff80" stroke-opacity="0.3" stroke-width="1"/><text x="243" y="215" text-anchor="middle" fill="#33ff80">7 LFO Modes</text>
    <rect x="314" y="196" width="108" height="28" rx="14" fill="#4dd9ff12" stroke="#4dd9ff" stroke-opacity="0.3" stroke-width="1"/><text x="368" y="215" text-anchor="middle" fill="#4dd9ff">13 Presets</text>

    <rect x="72" y="236" width="126" height="28" rx="14" fill="#33ff8012" stroke="#33ff80" stroke-opacity="0.3" stroke-width="1"/><text x="135" y="255" text-anchor="middle" fill="#33ff80">CHOP Output</text>
    <rect x="210" y="236" width="66" height="28" rx="14" fill="#1e1e2a" stroke="#3a3a58" stroke-width="1"/><text x="243" y="255" text-anchor="middle" fill="#8888aa">v2.0</text>
    <rect x="288" y="236" width="110" height="28" rx="14" fill="#1e1e2a" stroke="#3a3a58" stroke-width="1"/><text x="343" y="255" text-anchor="middle" fill="#8888aa">MIT License</text>
  </g>
</svg>
